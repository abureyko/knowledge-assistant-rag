services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      QDRANT_URL: http://qdrant:6333
      GRAPH_MODE: ${GRAPH_MODE:-core}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-offline-rule-based}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-hash://v1}
      CORPUS_PATH: /app/data/starter_corpus
      EVAL_DATASET_PATH: /app/src/knowledge_agent/eval/dataset.jsonl
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-knowledge-agent-core}
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
  qdrant:
    image: qdrant/qdrant:v1.17.1
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
